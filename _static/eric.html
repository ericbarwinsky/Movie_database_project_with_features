<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Movie App</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="list-movies-title">
    <h1>eric's Movie Room</h1>
</div>
<div class="container">
    <ul class="movie-grid">
        
        <li>
            <div class="movie " data-note="">
                <a href="https://www.imdb.com/title/tt0468569/" target="_blank">
                    <img class="movie-poster" src="https://m.media-amazon.com/images/M/MV5BMTMxNTMwODM0NF5BMl5BanBnXkFtZTcwODAyMTk2Mw@@._V1_QL75_UX380_CR0,0,380,562_.jpg" alt="The Dark Knight Poster">
                </a>
                <div class="movie-badge">
                    <img class="country-flag" src="https://purecatamphetamine.github.io/country-flag-icons/3x2/US.svg" alt="US">
                    <span class="movie-rating">★ 9.1</span>
                </div>
                <div class="movie-title">The Dark Knight</div>
                <div class="movie-year">2008</div>
            </div>
        </li>
        
    </ul>
</div>
</body>
</html>
